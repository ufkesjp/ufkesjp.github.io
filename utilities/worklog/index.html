<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#f4ede0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Work Log" />
<title>Work Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    border-radius: 0 !important;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --bg: #f4ede0;
    --ink: #0a0a0a;
    --paper: #ffffff;
    --accent: #ffd60a;
    --danger: #ff3b30;
    --safe: #2d7a3d;
    --safe-soft: #c8e6cf;
    --bord: 3px solid #0a0a0a;
    --shadow: 6px 6px 0 #0a0a0a;
    --shadow-sm: 4px 4px 0 #0a0a0a;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    color: var(--ink);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(10,10,10,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(10,10,10,0.06) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }

  .wordmark {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: 24px;
    letter-spacing: -0.02em;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 11px;
    padding: 4px 10px;
    border: 2px solid var(--ink);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .tag.accent { background: var(--accent); }
  .tag.safe { background: var(--safe); color: #fff; border-color: var(--safe); }

  .panel {
    background: var(--paper);
    border: var(--bord);
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 16px;
  }

  .panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.55;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: var(--bord);
  }

  .prompt {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.01em;
    margin-bottom: 16px;
  }

  textarea {
    width: 100%;
    padding: 12px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 500;
    background: var(--paper);
    border: var(--bord);
    color: var(--ink);
    outline: none;
    resize: none;
    height: 100px;
    margin-bottom: 12px;
    -webkit-appearance: none;
    appearance: none;
    line-height: 1.5;
  }

  textarea:focus {
    outline: 2px solid var(--ink);
    outline-offset: 2px;
  }

  textarea::placeholder {
    opacity: 0.35;
    font-style: italic;
  }

  .btn {
    width: 100%;
    padding: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--paper);
    border: var(--bord);
    color: var(--ink);
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: transform 0.08s, box-shadow 0.08s;
    -webkit-appearance: none;
    appearance: none;
  }

  .btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--ink);
  }

  .btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--ink);
  }

  .btn.primary { background: var(--accent); }
  .btn.warn { background: var(--danger); color: #fff; }
  .btn.success { background: var(--safe); color: #fff; }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .err {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--danger);
    margin-top: 10px;
    display: none;
  }

  /* ── Timer screen ── */
  .working-on-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 6px;
  }

  .working-on-task {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 18px;
    line-height: 1.3;
    word-break: break-word;
  }

  .big-time {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: clamp(42px, 12vw, 64px);
    letter-spacing: -0.03em;
    line-height: 1;
    padding: 24px 20px;
    background: var(--paper);
    border: var(--bord);
    box-shadow: var(--shadow);
    text-align: center;
    margin-bottom: 16px;
  }

  .big-time.paused {
    color: rgba(10,10,10,0.3);
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .status-dot {
    width: 10px;
    height: 10px;
    background: var(--safe);
    border: 2px solid var(--ink);
    flex-shrink: 0;
  }

  .status-dot.paused {
    background: var(--accent);
  }

  .status-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── Summary screen ── */
  .summary-time {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: clamp(32px, 9vw, 52px);
    letter-spacing: -0.03em;
    line-height: 1;
    padding: 20px;
    background: var(--safe);
    color: #fff;
    border: var(--bord);
    box-shadow: var(--shadow);
    text-align: center;
    margin-bottom: 16px;
  }

  .summary-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 6px;
  }

  .summary-task {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 20px;
    line-height: 1.3;
    word-break: break-word;
  }

  .summary-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .meta-box {
    background: var(--paper);
    border: var(--bord);
    box-shadow: var(--shadow-sm);
    padding: 12px 14px;
  }

  .meta-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.55;
    margin-bottom: 4px;
  }

  .meta-val {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: 14px;
    line-height: 1.3;
    word-break: break-word;
  }

  /* ── Log history ── */
  .log-entry {
    background: var(--paper);
    border: var(--bord);
    box-shadow: var(--shadow-sm);
    padding: 12px 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .log-task {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    flex: 1;
    word-break: break-word;
  }

  .log-duration {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: 13px;
    flex-shrink: 0;
    background: var(--accent);
    padding: 3px 8px;
    border: 2px solid var(--ink);
  }

  .log-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    opacity: 0.45;
    margin-top: 3px;
  }

  .section-title {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.55;
    margin-bottom: 10px;
  }

  .no-log {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    opacity: 0.4;
    text-align: center;
    padding: 20px;
    border: 2px dashed rgba(10,10,10,0.2);
  }

  #view-setup, #view-timer, #view-summary { display: none; }
  #view-setup { display: block; }
</style>
</head>
<body>
<div id="app">

  <div class="wordmark">
    WORK LOG
    <span class="tag accent">v1.0</span>
  </div>

  <!-- ── Setup ── -->
  <div id="view-setup">
    <div class="panel">
      <div class="prompt">What are you working on?</div>
      <textarea id="task-input" placeholder="e.g. Writing the Q3 report..." maxlength="200"></textarea>
      <button class="btn primary" onclick="startTask()">▶ Start</button>
      <div class="err" id="err-msg">Please describe what you're working on.</div>
    </div>

    <div id="log-section" style="display:none;">
      <div class="section-title">Session log</div>
      <div id="log-list"></div>
      <button class="btn warn" style="margin-top:4px;" onclick="clearLog()">✕ Clear log</button>
    </div>
  </div>

  <!-- ── Timer ── -->
  <div id="view-timer">
    <div class="panel" style="margin-bottom:16px;">
      <div class="working-on-label">Currently working on</div>
      <div class="working-on-task" id="timer-task">—</div>
    </div>

    <div class="big-time" id="timer-display">00:00:00</div>

    <div class="status-row">
      <div class="status-dot" id="status-dot"></div>
      <div class="status-text" id="status-text">Running</div>
    </div>

    <div class="btn-row" style="margin-bottom:10px;">
      <button class="btn primary" id="pause-btn" onclick="togglePause()">⏸ Pause</button>
      <button class="btn warn" onclick="endTask()">■ End task</button>
    </div>
  </div>

  <!-- ── Summary ── -->
  <div id="view-summary">
    <div class="panel" style="margin-bottom:16px;">
      <div class="summary-label">You spent</div>
      <div class="summary-time" id="summary-time">—</div>
      <div class="summary-label" style="margin-top:14px;">on</div>
      <div class="summary-task" id="summary-task">—</div>
    </div>

    <div class="summary-meta" id="summary-meta"></div>

    <div class="btn-row">
      <button class="btn primary" onclick="newTask()">▶ New task</button>
      <button class="btn" onclick="showSetup()">↺ Back</button>
    </div>
  </div>

</div>
<script>
'use strict';

const LOG_KEY = 'worklog-v1';
let taskName = '';
let startTime = null;
let elapsed = 0;
let pausedAt = null;
let isPaused = false;
let ticker = null;

function getLog() {
  try { return JSON.parse(localStorage.getItem(LOG_KEY)) || []; }
  catch(e) { return []; }
}

function saveLog(log) {
  try { localStorage.setItem(LOG_KEY, JSON.stringify(log)); } catch(e) {}
}

function addToLog(task, ms, start) {
  const log = getLog();
  log.unshift({ task, ms, start: start.toISOString() });
  if (log.length > 50) log.pop();
  saveLog(log);
}

function clearLog() {
  if (!confirm('Clear all log entries?')) return;
  localStorage.removeItem(LOG_KEY);
  renderLog();
}

function pad(n) { return String(n).padStart(2, '0'); }

function fmtHMS(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sc = s % 60;
  return pad(h) + ':' + pad(m) + ':' + pad(sc);
}

function fmtDuration(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sc = s % 60;
  if (h > 0) return h + 'h ' + pad(m) + 'm ' + pad(sc) + 's';
  if (m > 0) return m + 'm ' + pad(sc) + 's';
  return sc + 's';
}

function fmtTime(iso) {
  return new Date(iso).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}

function show(id) {
  ['view-setup', 'view-timer', 'view-summary'].forEach(v => {
    document.getElementById(v).style.display = v === id ? 'block' : 'none';
  });
}

function startTask() {
  const val = document.getElementById('task-input').value.trim();
  if (!val) { document.getElementById('err-msg').style.display = 'block'; return; }
  document.getElementById('err-msg').style.display = 'none';
  taskName = val;
  startTime = new Date();
  elapsed = 0;
  isPaused = false;
  pausedAt = null;

  document.getElementById('timer-task').textContent = taskName;
  document.getElementById('timer-display').textContent = '00:00:00';
  document.getElementById('timer-display').classList.remove('paused');
  document.getElementById('status-dot').className = 'status-dot';
  document.getElementById('status-text').textContent = 'Running';
  document.getElementById('pause-btn').textContent = '⏸ Pause';

  show('view-timer');
  if (ticker) clearInterval(ticker);
  ticker = setInterval(tick, 1000);
}

function tick() {
  if (!isPaused) {
    elapsed = Date.now() - startTime.getTime();
    document.getElementById('timer-display').textContent = fmtHMS(elapsed);
  }
}

function togglePause() {
  if (isPaused) {
    startTime = new Date(Date.now() - elapsed);
    isPaused = false;
    document.getElementById('status-dot').className = 'status-dot';
    document.getElementById('status-text').textContent = 'Running';
    document.getElementById('pause-btn').textContent = '⏸ Pause';
    document.getElementById('timer-display').classList.remove('paused');
  } else {
    isPaused = true;
    document.getElementById('status-dot').className = 'status-dot paused';
    document.getElementById('status-text').textContent = 'Paused';
    document.getElementById('pause-btn').textContent = '▶ Resume';
    document.getElementById('timer-display').classList.add('paused');
  }
}

function endTask() {
  clearInterval(ticker);
  if (!isPaused) elapsed = Date.now() - startTime.getTime();
  addToLog(taskName, elapsed, startTime);

  document.getElementById('summary-time').textContent = fmtDuration(elapsed);
  document.getElementById('summary-task').textContent = taskName;

  const meta = document.getElementById('summary-meta');
  meta.innerHTML = '';
  meta.appendChild(metaBox('Started', fmtTime(startTime.toISOString())));
  meta.appendChild(metaBox('Ended', fmtTime(new Date().toISOString())));

  show('view-summary');
  renderLog();
}

function metaBox(label, val) {
  const box = document.createElement('div');
  box.className = 'meta-box';
  box.innerHTML = '<div class="meta-label">' + label + '</div><div class="meta-val">' + val + '</div>';
  return box;
}

function newTask() {
  document.getElementById('task-input').value = '';
  show('view-setup');
  renderLog();
}

function showSetup() {
  show('view-setup');
  renderLog();
}

function renderLog() {
  const log = getLog();
  const section = document.getElementById('log-section');
  const list = document.getElementById('log-list');
  list.innerHTML = '';

  if (log.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  log.forEach(entry => {
    const el = document.createElement('div');
    el.className = 'log-entry';
    el.innerHTML =
      '<div>' +
        '<div class="log-task">' + escHtml(entry.task) + '</div>' +
        '<div class="log-time">' + fmtTime(entry.start) + '</div>' +
      '</div>' +
      '<div class="log-duration">' + fmtDuration(entry.ms) + '</div>';
    list.appendChild(el);
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderLog();
</script>
</body>
</html>
