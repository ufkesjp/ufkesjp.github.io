<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#f4ede0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Countdown" />
<title>Countdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    border-radius: 0 !important;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --bg: #f4ede0;
    --ink: #0a0a0a;
    --paper: #ffffff;
    --accent: #ffd60a;
    --danger: #ff3b30;
    --safe: #2d7a3d;
    --bord: 3px solid #0a0a0a;
    --shadow: 6px 6px 0 #0a0a0a;
    --shadow-sm: 4px 4px 0 #0a0a0a;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    color: var(--ink);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(10,10,10,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(10,10,10,0.06) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }

  .wordmark {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.02em;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 11px;
    padding: 4px 10px;
    border: 2px solid var(--ink);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .tag.accent { background: var(--accent); }

  .panel {
    background: var(--paper);
    border: var(--bord);
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 16px;
  }

  .panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.55;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: var(--bord);
  }

  input[type="text"],
  input[type="datetime-local"] {
    width: 100%;
    padding: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    background: var(--paper);
    border: var(--bord);
    color: var(--ink);
    outline: none;
    margin-bottom: 12px;
    -webkit-appearance: none;
    appearance: none;
  }

  input:focus {
    outline: 2px solid var(--ink);
    outline-offset: 2px;
  }

  .btn {
    width: 100%;
    padding: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--paper);
    border: var(--bord);
    color: var(--ink);
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: transform 0.08s, box-shadow 0.08s;
    -webkit-appearance: none;
    appearance: none;
  }

  .btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--ink);
  }

  .btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--ink);
  }

  .btn.primary { background: var(--accent); }
  .btn.warn { background: var(--danger); color: #fff; }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .err {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--danger);
    margin-top: 10px;
    display: none;
  }

  .timer-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .timer-header-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 4px;
  }

  .timer-header-name {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: 20px;
    word-break: break-word;
  }

  .big-time {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: clamp(28px, 8vw, 44px);
    letter-spacing: -0.03em;
    line-height: 1;
    padding: 20px;
    background: var(--paper);
    border: var(--bord);
    box-shadow: var(--shadow);
    text-align: center;
    margin-bottom: 16px;
    word-break: break-all;
  }

  .big-time.done { color: var(--safe); }

  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .stat-box {
    background: var(--paper);
    border: var(--bord);
    box-shadow: var(--shadow-sm);
    padding: 12px 14px;
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.55;
    margin-bottom: 4px;
  }

  .stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: 16px;
    line-height: 1.3;
    word-break: break-word;
  }

  .progress-bar-wrap {
    background: var(--paper);
    border: var(--bord);
    padding: 3px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 6px;
  }

  .progress-bar-inner {
    height: 24px;
    background: var(--ink);
    width: 0%;
    transition: width 0.9s linear;
  }

  .progress-bar-inner.done { background: var(--safe); }

  .progress-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    opacity: 0.5;
    text-align: right;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  #setup-view { display: block; }
  #timer-view { display: none; }
</style>
</head>
<body>
<div id="app">

  <div class="wordmark">
    COUNTDOWN
    <span class="tag accent">v1.0</span>
  </div>

  <!-- Setup -->
  <div id="setup-view">
    <div class="panel">
      <div class="panel-title">New countdown</div>
      <input type="text" id="label-in" placeholder="Event name (e.g. SUMMER)" maxlength="32" />
      <input type="datetime-local" id="target-in" />
      <button class="btn primary" onclick="start()">Begin ›</button>
      <div class="err" id="err-msg">Please choose a future date and time.</div>
    </div>
  </div>

  <!-- Timer -->
  <div id="timer-view">
    <div class="panel" style="margin-bottom:16px;">
      <div class="timer-header">
        <div>
          <div class="timer-header-label">Counting down to</div>
          <div class="timer-header-name" id="t-label">—</div>
        </div>
        <span class="tag" id="t-status">ACTIVE</span>
      </div>
    </div>

    <div class="big-time" id="t-countdown">—</div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-label">Target</div>
        <div class="stat-val" id="t-target">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Elapsed</div>
        <div class="stat-val" id="t-elapsed">—</div>
      </div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar-inner" id="prog-bar"></div>
    </div>
    <div class="progress-label" id="prog-label">0% complete</div>

    <div class="btn-row">
      <button class="btn" onclick="reset()">↺ Reset</button>
      <button class="btn warn" onclick="clear_countdown()">✕ Clear</button>
    </div>
  </div>

</div>
<script>
'use strict';

const STORE_KEY = 'countdown-v1';
let targetTime = null;
let startTime = null;
let ticker = null;
let arrived = false;

function save(label, target, start) {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({ label, target: target.toISOString(), start: start.toISOString() }));
  } catch(e) {}
}

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return null;
    const d = JSON.parse(raw);
    return { label: d.label, target: new Date(d.target), start: new Date(d.start) };
  } catch(e) { return null; }
}

function clear_store() {
  try { localStorage.removeItem(STORE_KEY); } catch(e) {}
}

function pad(n) { return String(n).padStart(2, '0'); }

function fmtRemaining(ms) {
  if (ms <= 0) return 'ARRIVED';
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sc = s % 60;
  if (d > 0) return d + 'd ' + pad(h) + 'h ' + pad(m) + 'm';
  if (h > 0) return pad(h) + ':' + pad(m) + ':' + pad(sc);
  return pad(m) + ':' + pad(sc);
}

function fmtElapsed(ms) {
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  if (d > 0) return d + 'd ' + pad(h) + 'h';
  if (h > 0) return pad(h) + 'h ' + pad(m) + 'm';
  return Math.floor(s / 60) + 'm ' + pad(s % 60) + 's';
}

function fmtDate(d) {
  return d.toLocaleString(undefined, { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
}

function showTimer(label, target, start) {
  targetTime = target;
  startTime = start;
  arrived = false;

  document.getElementById('t-label').textContent = label.toUpperCase();
  document.getElementById('t-target').textContent = fmtDate(target);
  document.getElementById('t-status').textContent = 'ACTIVE';
  document.getElementById('t-countdown').classList.remove('done');
  document.getElementById('prog-bar').classList.remove('done');

  document.getElementById('setup-view').style.display = 'none';
  document.getElementById('timer-view').style.display = 'block';

  tick();
  if (ticker) clearInterval(ticker);
  ticker = setInterval(tick, 1000);
}

function tick() {
  const now = new Date();
  const rem = targetTime - now;
  const total = targetTime - startTime;
  const elapsed = now - startTime;
  const pct = Math.min(1, Math.max(0, elapsed / total));

  document.getElementById('t-countdown').textContent = fmtRemaining(rem);
  document.getElementById('t-elapsed').textContent = fmtElapsed(Math.max(0, elapsed));
  document.getElementById('prog-bar').style.width = Math.round(pct * 100) + '%';
  document.getElementById('prog-label').textContent = Math.round(pct * 100) + '% complete';

  if (rem <= 0 && !arrived) {
    arrived = true;
    clearInterval(ticker);
    document.getElementById('t-status').textContent = 'ARRIVED';
    document.getElementById('t-countdown').classList.add('done');
    document.getElementById('prog-bar').classList.add('done');
  }
}

function start() {
  const label = document.getElementById('label-in').value.trim() || 'COUNTDOWN';
  const val = document.getElementById('target-in').value;
  const err = document.getElementById('err-msg');
  if (!val) { err.style.display = 'block'; return; }
  const target = new Date(val);
  if (target <= new Date()) { err.style.display = 'block'; return; }
  err.style.display = 'none';
  const start = new Date();
  save(label, target, start);
  showTimer(label, target, start);
}

function reset() {
  if (ticker) clearInterval(ticker);
  document.getElementById('timer-view').style.display = 'none';
  document.getElementById('setup-view').style.display = 'block';
}

function clear_countdown() {
  if (ticker) clearInterval(ticker);
  clear_store();
  document.getElementById('label-in').value = '';
  document.getElementById('target-in').value = '';
  document.getElementById('t-countdown').classList.remove('done');
  document.getElementById('prog-bar').classList.remove('done');
  document.getElementById('timer-view').style.display = 'none';
  document.getElementById('setup-view').style.display = 'block';
}

(function restore() {
  const d = load();
  if (!d) return;
  document.getElementById('label-in').value = d.label;
  document.getElementById('target-in').value = d.target.toISOString().slice(0, 16);
  showTimer(d.label, d.target, d.start);
})();
</script>
</body>
</html>
