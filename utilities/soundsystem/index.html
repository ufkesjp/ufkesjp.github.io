<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#060c14" />
<title>Sound System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #060c14;
    --surface:     #0d1e2e;
    --surface-2:   rgba(255,255,255,0.04);
    --ink:         #cfe7d8;
    --ink-muted:   #8fb0a4;
    --ink-faint:   #4a6b62;
    --accent:      #5ec9b0;
    --accent-glow: rgba(94,201,176,0.18);
    --accent-2:    #3a8a78;
    --bord:        1px solid rgba(143,176,164,0.18);
    --bord-accent: 1px solid rgba(94,201,176,0.4);
    --font-head:   'Cormorant Garamond', Georgia, serif;
    --font-body:   'Jost', system-ui, sans-serif;
  }

  @keyframes breathe  { 0%,100%{opacity:.5;transform:scale(1);}  50%{opacity:1;transform:scale(1.25);} }
  @keyframes ripple   { 0%{box-shadow:0 0 0 0 rgba(94,201,176,.35);} 100%{box-shadow:0 0 0 24px transparent;} }
  @keyframes logIn    { from{opacity:0;transform:translateX(-8px);} to{opacity:1;transform:translateX(0);} }
  @keyframes chatIn   { from{opacity:0;transform:translateY(14px) scale(.96);} to{opacity:1;transform:translateY(0) scale(1);} }
  @keyframes fadeIn   { from{opacity:0;} to{opacity:1;} }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    font-weight: 300;
    line-height: 1.7;
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 30%, rgba(40,180,150,.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(80,200,255,.05) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  /* ── Top bar ── */
  .top-bar {
    position: relative; z-index: 10;
    padding: 16px 6%;
    border-bottom: var(--bord);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    background: rgba(6,12,20,0.7);
    backdrop-filter: blur(12px);
  }
  .back-link {
    font-family: var(--font-body); font-size: 11px; letter-spacing: 0.4em;
    text-transform: uppercase; color: var(--accent); text-decoration: none;
    transition: color 0.3s;
  }
  .back-link:hover { color: var(--ink); }

  /* ── Layout ── */
  #app {
    position: relative; z-index: 1;
    max-width: 820px; margin: 0 auto;
    padding: 48px 6% 80px;
    display: flex; flex-direction: column; gap: 40px;
  }

  /* ── Header ── */
  .page-header { border-bottom: var(--bord); padding-bottom: 28px; }
  .overline {
    font-family: var(--font-body); font-size: 0.7rem;
    letter-spacing: 0.5em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 12px;
  }
  .page-header h1 {
    font-family: var(--font-head); font-weight: 300; font-style: italic;
    font-size: clamp(2.2rem, 5vw, 4rem); line-height: 1.05; color: var(--ink);
    margin-bottom: 10px;
  }
  .page-header p { color: var(--ink-muted); font-style: italic; font-size: 1rem; margin: 0; }

  /* ── Body ── */
  .body-grid {
    display: grid;
    grid-template-columns: 1fr 220px;
    gap: 28px;
    align-items: start;
  }

  /* ── Group label ── */
  .group-label {
    font-family: var(--font-body); font-size: 0.65rem;
    letter-spacing: 0.45em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 10px;
  }

  /* ── Sound buttons ── */
  .btn-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }

  .sound-btn {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 18px;
    background: transparent;
    border: var(--bord);
    border-radius: 2px;
    color: var(--ink);
    cursor: pointer;
    text-align: left; width: 100%;
    transition: border-color 0.4s, background 0.4s, box-shadow 0.4s;
    position: relative; overflow: hidden;
  }
  .sound-btn:hover {
    border-color: rgba(94,201,176,0.4);
    background: var(--accent-glow);
  }
  .sound-btn.active {
    border-color: rgba(94,201,176,0.6);
    background: rgba(94,201,176,0.08);
    animation: ripple 0.5s ease-out;
  }
  .sound-btn.drone-on {
    border-color: rgba(94,201,176,0.5);
    background: rgba(94,201,176,0.06);
  }

  .btn-orb {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    background: radial-gradient(circle at 38% 35%, rgba(94,201,176,.45), rgba(94,201,176,.08));
    border: 1px solid rgba(94,201,176,.25);
    box-shadow: 0 0 6px rgba(94,201,176,.1);
    transition: box-shadow 0.4s;
  }
  .sound-btn.active .btn-orb,
  .sound-btn.drone-on .btn-orb {
    box-shadow: 0 0 20px rgba(94,201,176,.55);
    animation: breathe 3s ease infinite;
  }

  .btn-text { flex: 1; }
  .btn-label {
    font-family: var(--font-body); font-size: 13px;
    color: var(--accent); margin-bottom: 2px; font-weight: 400;
  }
  .btn-desc {
    font-family: var(--font-body); font-size: 10px;
    letter-spacing: 0.08em; color: var(--ink-faint);
  }

  /* ── Right column ── */
  .right-col { display: flex; flex-direction: column; gap: 28px; }

  /* ── Event log ── */
  .log-list { display: flex; flex-direction: column; gap: 6px; }
  .log-entry {
    font-family: var(--font-body); font-size: 11px;
    letter-spacing: 0.04em; padding: 7px 12px;
    border-radius: 2px; border: 1px solid transparent;
    color: var(--ink-faint);
    transition: color 0.3s;
  }
  .log-entry.fresh {
    color: var(--accent);
    background: rgba(94,201,176,.06);
    border-color: rgba(94,201,176,.2);
    animation: logIn 0.2s ease;
  }
  .log-entry::before { content: "▶ "; }

  /* ── Tail length chart ── */
  .tail-row { margin-bottom: 8px; }
  .tail-meta {
    display: flex; justify-content: space-between;
    font-family: var(--font-body); font-size: 9px;
    letter-spacing: 0.1em; margin-bottom: 4px;
  }
  .tail-name { color: var(--ink-faint); }
  .tail-val  { color: var(--accent); }
  .tail-track {
    height: 2px; background: rgba(94,201,176,.08); border-radius: 99px;
  }
  .tail-fill {
    height: 2px; border-radius: 99px;
    background: var(--accent); opacity: 0.55;
  }

  /* ── AI Chat Panel ── */
  #chat-panel {
    display: none;
    position: fixed; bottom: 28px; right: 28px; width: 320px;
    background: #090b13;
    border-radius: 4px;
    border: var(--bord-accent);
    box-shadow: 0 0 80px rgba(94,201,176,.08), 0 32px 80px rgba(0,0,0,.7);
    animation: chatIn 0.4s cubic-bezier(0.34,1.3,0.64,1);
    z-index: 200;
    overflow: hidden;
  }
  #chat-panel.open { display: block; }
  .chat-header {
    padding: 14px 20px;
    border-bottom: var(--bord);
    display: flex; align-items: center; justify-content: space-between;
  }
  .chat-indicator {
    display: flex; align-items: center; gap: 10px;
  }
  .chat-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px rgba(94,201,176,.6);
    animation: breathe 3s ease infinite;
  }
  .chat-label {
    font-family: var(--font-body); font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(94,201,176,.65);
  }
  .chat-close {
    background: none; border: none; color: var(--ink-faint);
    font-size: 20px; cursor: pointer; padding: 0 4px;
    transition: color 0.2s;
  }
  .chat-close:hover { color: var(--ink); }
  .chat-body { padding: 18px 20px 20px; }
  .chat-message {
    font-family: var(--font-head); font-style: italic; font-weight: 300;
    font-size: 13px; color: rgba(94,201,176,.75); line-height: 1.7;
    padding: 14px 16px;
    background: rgba(94,201,176,.05);
    border: var(--bord);
    border-radius: 2px;
    margin-bottom: 14px;
  }
  .chat-input-row {
    display: flex; border: var(--bord); border-radius: 2px; overflow: hidden;
  }
  .chat-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--ink-muted); font-family: var(--font-head); font-style: italic;
    font-size: 13px; padding: 11px 14px;
    width: auto;
  }
  .chat-send {
    background: transparent; border: none;
    border-left: var(--bord);
    color: rgba(94,201,176,.6); padding: 11px 14px;
    font-family: var(--font-body); font-size: 9px;
    letter-spacing: 0.18em; text-transform: uppercase;
    cursor: pointer; transition: color 0.2s, background 0.2s;
  }
  .chat-send:hover { color: var(--accent); background: var(--accent-glow); }

  /* ── Footer ── */
  footer {
    position: relative; z-index: 1;
    border-top: var(--bord); padding: 1.5rem 6%;
    text-align: center; font-size: 0.75rem;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink-faint);
  }

  @media (max-width: 640px) {
    .body-grid { grid-template-columns: 1fr; }
    .right-col { flex-direction: row; flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <a class="back-link" href="../">← Utilities</a>
  <span style="font-family:var(--font-body);font-size:10px;letter-spacing:0.35em;text-transform:uppercase;color:var(--ink-faint);">Sound System</span>
</div>

<div id="app">

  <div class="page-header">
    <div class="overline">⟢ Utility ⟣</div>
    <h1>Sound System</h1>
    <p>Eight UI sounds for apps and interfaces. Click any to preview.</p>
  </div>

  <div class="body-grid">

    <!-- Left: buttons -->
    <div>
      <div class="group-label">Lifecycle</div>
      <div class="btn-group" id="group-lifecycle"></div>

      <div class="group-label">Interaction</div>
      <div class="btn-group" id="group-interaction"></div>
    </div>

    <!-- Right: log + tail chart -->
    <div class="right-col">
      <div>
        <div class="group-label">Event log</div>
        <div class="log-list" id="log-list"></div>
      </div>

      <div>
        <div class="group-label" style="margin-bottom:12px;">Tail length</div>
        <div id="tail-chart"></div>
      </div>
    </div>

  </div>
</div>

<!-- AI Chat Panel -->
<div id="chat-panel">
  <div class="chat-header">
    <div class="chat-indicator">
      <div class="chat-dot"></div>
      <span class="chat-label">AI Assistant</span>
    </div>
    <button class="chat-close" id="chat-close">×</button>
  </div>
  <div class="chat-body">
    <div class="chat-message">Good evening. How may I assist you?</div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" placeholder="Ask anything…" />
      <button class="chat-send" id="chat-send">Send</button>
    </div>
  </div>
</div>

<footer>&copy; 2026 Jacob Ufkes &mdash; Built with AI assistance</footer>

<script>
'use strict';

// ─── Audio Engine ─────────────────────────────────────────────────────────────
let _ctx = null, _reverb = null;
function getCtx() {
  if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  return _ctx;
}
function getReverb() {
  if (_reverb) return _reverb;
  const ctx = getCtx();
  const len = ctx.sampleRate * 1.8;
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/len, 2.4);
  }
  _reverb = ctx.createConvolver();
  _reverb.buffer = buf;
  _reverb.connect(ctx.destination);
  return _reverb;
}
function tone({ freq, type='sine', vol=0.15, attack=0.04, release=0.6, freqEnd=null, delay=0, reverbMix=0.35 }) {
  const ctx = getCtx(), reverb = getReverb();
  const osc = ctx.createOscillator(), gain = ctx.createGain();
  const dry = ctx.createGain(), wet = ctx.createGain();
  osc.connect(gain); gain.connect(dry); gain.connect(wet);
  dry.connect(ctx.destination); wet.connect(reverb);
  dry.gain.value = 1 - reverbMix; wet.gain.value = reverbMix;
  const t = ctx.currentTime + delay;
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, t + release * 0.5);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + attack);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + attack + release);
  osc.start(t); osc.stop(t + attack + release + 0.1);
}
function chord({ root, ratios=[1,1.5,2], vols, type='sine', attack=0.05, release=0.7, delay=0, reverbMix=0.4 }) {
  ratios.forEach((r, i) => tone({
    freq: root*r, type,
    vol: vols ? vols[i] : 0.12/(i+1),
    attack: attack + i*0.01,
    release: release - i*0.05,
    delay: delay + i*0.008,
    reverbMix,
  }));
}

// ─── Sound Library ────────────────────────────────────────────────────────────
const sounds = {
  select:   () => tone({ freq:740, vol:0.04, attack:0.02, release:0.10, reverbMix:0.25 }),
  cancel:   () => {
    tone({ freq:528, vol:0.12, attack:0.04, release:0.32, reverbMix:0.35 });
    tone({ freq:396, vol:0.08, attack:0.06, release:0.35, delay:0.06, reverbMix:0.40 });
    tone({ freq:264, vol:0.05, attack:0.08, release:0.38, delay:0.12, reverbMix:0.45 });
  },
  accept:   () => {
    chord({ root:329, ratios:[1,1.25,1.5,2], vols:[0.14,0.09,0.07,0.05], attack:0.04, release:0.85, reverbMix:0.45 });
    tone({ freq:1318, vol:0.03, attack:0.08, release:0.7, delay:0.12, reverbMix:0.6 });
  },
  reject:   () => {
    tone({ freq:370, vol:0.14, attack:0.006, release:0.09, reverbMix:0.15 });
    tone({ freq:277, vol:0.11, attack:0.006, release:0.08, delay:0.07,  reverbMix:0.12 });
    tone({ freq:370, vol:0.07, attack:0.006, release:0.07, delay:0.14,  reverbMix:0.10 });
  },
  aiOpen:   () => {
    tone({ freq:82,   vol:0.18, attack:0.08, release:0.55, reverbMix:0.30 });
    tone({ freq:246,  vol:0.12, attack:0.06, release:0.50, delay:0.08,  reverbMix:0.45 });
    tone({ freq:369,  freqEnd:740, vol:0.10, attack:0.05, release:0.42, delay:0.14, reverbMix:0.55 });
    tone({ freq:740,  vol:0.07, attack:0.07, release:0.38, delay:0.22,  reverbMix:0.62 });
    tone({ freq:1108, vol:0.04, attack:0.10, release:0.45, delay:0.32,  reverbMix:0.70 });
    tone({ freq:1480, vol:0.02, attack:0.12, release:0.35, delay:0.44,  reverbMix:0.80 });
  },
  appOpen:  () => {
    tone({ freq:164, vol:0.10, attack:0.06, release:0.45, reverbMix:0.40, delay:0.00 });
    tone({ freq:246, vol:0.09, attack:0.06, release:0.45, reverbMix:0.45, delay:0.12 });
    tone({ freq:329, vol:0.08, attack:0.06, release:0.50, reverbMix:0.50, delay:0.22 });
    tone({ freq:494, vol:0.07, attack:0.06, release:0.55, reverbMix:0.55, delay:0.30 });
    tone({ freq:659, vol:0.05, attack:0.07, release:0.60, reverbMix:0.60, delay:0.38 });
    tone({ freq:988, vol:0.03, attack:0.08, release:0.55, reverbMix:0.65, delay:0.46 });
  },
  appClose: () => {
    tone({ freq:659, vol:0.10, attack:0.03, release:0.30, reverbMix:0.35, delay:0.00 });
    tone({ freq:494, vol:0.09, attack:0.03, release:0.30, reverbMix:0.38, delay:0.10 });
    tone({ freq:329, vol:0.08, attack:0.04, release:0.32, reverbMix:0.40, delay:0.18 });
    tone({ freq:246, vol:0.06, attack:0.04, release:0.30, reverbMix:0.42, delay:0.25 });
    tone({ freq:164, vol:0.05, attack:0.05, release:0.35, reverbMix:0.45, delay:0.32 });
  },
};

// ─── Idle Drone ───────────────────────────────────────────────────────────────
let _droneOsc=null, _droneGain=null, _droneLfo=null, droneOn=false;
function startIdle() {
  if (_droneOsc) return;
  const ctx = getCtx();
  _droneOsc = ctx.createOscillator(); _droneGain = ctx.createGain();
  _droneOsc.type = 'sine'; _droneOsc.frequency.value = 82;
  _droneOsc.connect(_droneGain); _droneGain.connect(ctx.destination);
  _droneGain.gain.setValueAtTime(0, ctx.currentTime);
  _droneGain.gain.linearRampToValueAtTime(0.018, ctx.currentTime + 2.5);
  _droneLfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();
  _droneLfo.type = 'sine'; _droneLfo.frequency.value = 0.12; lfoGain.gain.value = 0.010;
  _droneLfo.connect(lfoGain); lfoGain.connect(_droneGain.gain);
  _droneOsc.start(); _droneLfo.start();
}
function stopIdle() {
  if (!_droneOsc) return;
  const ctx = getCtx();
  _droneGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 1.5);
  setTimeout(() => {
    try { _droneOsc.stop(); _droneLfo.stop(); } catch(_) {}
    _droneOsc=null; _droneGain=null; _droneLfo=null;
  }, 1600);
}

// ─── Button Definitions ───────────────────────────────────────────────────────
const BUTTONS = [
  { id:'appOpen',  label:'App Open',         desc:'Boot sequence — ascending tones',       group:'lifecycle' },
  { id:'appClose', label:'App Close',         desc:'Shutdown — descending mirror',          group:'lifecycle' },
  { id:'idle',     label:'Idle Drone',        desc:'Background hum — toggle on / off',      group:'lifecycle' },
  { id:'select',   label:'Navigate / Hover',  desc:'Whisper — almost subliminal',           group:'interaction' },
  { id:'accept',   label:'Confirm / Accept',  desc:'Rising glass chord — rings longest',    group:'interaction' },
  { id:'cancel',   label:'Cancel / Back',     desc:'Receding pool — gentle drift',          group:'interaction' },
  { id:'reject',   label:'Error / Reject',    desc:'Staccato — clipped and dry',            group:'interaction' },
  { id:'aiOpen',   label:'Open AI Assistant', desc:'Harmonic awakening — deep to crystal',  group:'interaction' },
];

const TAILS = [
  ['reject',   0.1], ['select', 0.1], ['cancel', 0.4],
  ['appClose', 0.6], ['aiOpen', 0.9], ['accept', 1.0], ['appOpen', 1.1],
];

// ─── Log ─────────────────────────────────────────────────────────────────────
const logList = document.getElementById('log-list');
const LOG_PLACEHOLDER = 'Click any sound to hear it';

function initLog() {
  const el = document.createElement('div');
  el.className = 'log-entry';
  el.textContent = LOG_PLACEHOLDER;
  logList.appendChild(el);
}

function addLog(label) {
  const entries = logList.querySelectorAll('.log-entry');
  entries.forEach(e => e.classList.remove('fresh'));
  if (entries.length === 1 && entries[0].textContent === LOG_PLACEHOLDER) {
    logList.innerHTML = '';
  }
  const el = document.createElement('div');
  el.className = 'log-entry fresh';
  el.textContent = label;
  logList.insertBefore(el, logList.firstChild);
  const all = logList.querySelectorAll('.log-entry');
  if (all.length > 8) all[all.length - 1].remove();
}

// ─── Tail Chart ───────────────────────────────────────────────────────────────
function buildTailChart() {
  const container = document.getElementById('tail-chart');
  TAILS.forEach(([name, len]) => {
    const row = document.createElement('div');
    row.className = 'tail-row';
    row.innerHTML = `
      <div class="tail-meta">
        <span class="tail-name">${name}</span>
        <span class="tail-val">${len}s</span>
      </div>
      <div class="tail-track">
        <div class="tail-fill" style="width:${(len/1.1)*100}%"></div>
      </div>`;
    container.appendChild(row);
  });
}

// ─── Build Buttons ────────────────────────────────────────────────────────────
function buildButtons() {
  BUTTONS.forEach(btn => {
    const group = document.getElementById(
      btn.group === 'lifecycle' ? 'group-lifecycle' : 'group-interaction'
    );
    const el = document.createElement('button');
    el.className = 'sound-btn';
    el.id = 'btn-' + btn.id;
    el.innerHTML = `
      <div class="btn-orb"></div>
      <div class="btn-text">
        <div class="btn-label">${btn.label}${btn.id==='idle' ? ' <span id="drone-state">· off</span>' : ''}</div>
        <div class="btn-desc">${btn.desc}</div>
      </div>`;
    el.addEventListener('click', () => fire(btn, el));
    group.appendChild(el);
  });
}

function fire(btn, el) {
  if (btn.id === 'idle') {
    droneOn = !droneOn;
    if (droneOn) { startIdle(); addLog('Idle drone — started'); }
    else         { stopIdle();  addLog('Idle drone — stopped'); }
    el.classList.toggle('drone-on', droneOn);
    document.getElementById('drone-state').textContent = droneOn ? '· on' : '· off';
    return;
  }

  sounds[btn.id]?.();
  addLog(btn.label);

  el.classList.add('active');
  setTimeout(() => el.classList.remove('active'), 500);

  if (btn.id === 'aiOpen') {
    setTimeout(() => openChat(), 250);
  }
}

// ─── Chat Panel ───────────────────────────────────────────────────────────────
const chatPanel = document.getElementById('chat-panel');

function openChat() {
  chatPanel.classList.add('open');
}

document.getElementById('chat-close').addEventListener('click', () => {
  sounds.cancel();
  chatPanel.classList.remove('open');
});

document.getElementById('chat-send').addEventListener('click', () => {
  sounds.accept();
});

document.getElementById('chat-input').addEventListener('focus', () => {
  sounds.select();
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
initLog();
buildButtons();
buildTailChart();
</script>
</body>
</html>
